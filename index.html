<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calcule suas emissões de CO2 em viagens">
    <title>Calculadora de Emissão de CO₂ - CarbonCalc</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <h1 class="header__title">🍃 Calculadora de Emissão de CO₂</h1>
        <p class="header__subtitle">Calcule seu impacto de carbono em viagens</p>
    </header>

    <main class="main">
        <form id="calculator-form" class="calculator-form">
            <!-- Origin Input -->
            <div class="calculator-form__group">
                <label for="origin" class="calculator-form__label">Origem</label>
                <input 
                    type="text" 
                    id="origin" 
                    class="calculator-form__input" 
                    placeholder="Escolha a cidade de origem"
                    list="cities-list"
                    required
                    autocomplete="off"
                >
                <datalist id="cities-list"></datalist>
            </div>

            <!-- Destination Input -->
            <div class="calculator-form__group">
                <label for="destination" class="calculator-form__label">Destino</label>
                <input 
                    type="text" 
                    id="destination" 
                    class="calculator-form__input" 
                    placeholder="Escolha a cidade de destino"
                    list="cities-list"
                    required
                    autocomplete="off"
                >
            </div>

            <!-- Distance Input -->
            <div class="calculator-form__group">
                <label for="distance" class="calculator-form__label">Distância (km)</label>
                <input 
                    type="number" 
                    id="distance" 
                    class="calculator-form__input" 
                    placeholder="0"
                    readonly
                    min="0"
                    step="0.01"
                >
                <p class="calculator-form__helper">Preenchida automaticamente</p>
            </div>

            <!-- Manual Distance Checkbox -->
            <div class="calculator-form__group calculator-form__group--checkbox">
                <input 
                    type="checkbox" 
                    id="manual-distance" 
                    class="calculator-form__checkbox"
                >
                <label for="manual-distance" class="calculator-form__label calculator-form__label--checkbox">
                    Inserir distância manualmente
                </label>
            </div>

            <!-- Transport Mode Selection -->
            <fieldset class="calculator-form__fieldset">
                <legend class="calculator-form__legend">Modo de Transporte</legend>
                <div class="calculator-form__transport-grid">
                    <div class="calculator-form__transport-item">
                        <input 
                            type="radio" 
                            id="transport-bicycle" 
                            name="transport" 
                            value="bicycle"
                            class="calculator-form__radio"
                        >
                        <label for="transport-bicycle" class="calculator-form__transport-label">
                            <span class="calculator-form__transport-icon">🚴</span>
                            <span class="calculator-form__transport-text">Bicicleta</span>
                        </label>
                    </div>

                    <div class="calculator-form__transport-item">
                        <input 
                            type="radio" 
                            id="transport-car" 
                            name="transport" 
                            value="car"
                            class="calculator-form__radio"
                            checked
                        >
                        <label for="transport-car" class="calculator-form__transport-label">
                            <span class="calculator-form__transport-icon">🚗</span>
                            <span class="calculator-form__transport-text">Carro</span>
                        </label>
                    </div>

                    <div class="calculator-form__transport-item">
                        <input 
                            type="radio" 
                            id="transport-bus" 
                            name="transport" 
                            value="bus"
                            class="calculator-form__radio"
                        >
                        <label for="transport-bus" class="calculator-form__transport-label">
                            <span class="calculator-form__transport-icon">🚌</span>
                            <span class="calculator-form__transport-text">Ônibus</span>
                        </label>
                    </div>

                    <div class="calculator-form__transport-item">
                        <input 
                            type="radio" 
                            id="transport-truck" 
                            name="transport" 
                            value="truck"
                            class="calculator-form__radio"
                        >
                        <label for="transport-truck" class="calculator-form__transport-label">
                            <span class="calculator-form__transport-icon">🚚</span>
                            <span class="calculator-form__transport-text">Caminhão</span>
                        </label>
                    </div>
                </div>
            </fieldset>

            <!-- Submit Button -->
            <button type="submit" class="calculator-form__button">Calcular Emissão</button>
        </form>

        <!-- Results Section -->
        <section id="results" class="results hidden">
            <h2 class="results__title">Resultado da Emissão de CO₂</h2>
            <div id="results-content" class="results__content"></div>
        </section>

        <!-- Comparison Section -->
        <section id="comparison" class="comparison hidden">
            <h2 class="comparison__title">Comparação de Emissões</h2>
            <div id="comparison-content" class="comparison__content"></div>
        </section>

        <!-- Carbon Credits Section -->
        <section id="carbon-content" class="carbon-credits hidden">
            <h2 class="carbon-credits__title">Créditos de Carbono</h2>
            <div id="carbon-credits-content" class="carbon-credits__content"></div>
        </section>
    </main>

    <footer class="footer">
        <p class="footer__text">Desenvolvido por Francisco Júnior | Projeto GitHub Copilot | CarbonCalc | EcoTrip</p>
    </footer>

    <script src="routesDB.js"></script>
    <script src="js/config.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
